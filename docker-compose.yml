name: coding-learning-system

services:
  db:
    image: postgres:13
    container_name: postgres-db-judge0
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_POSTGRES_PASSWORD}
    volumes:
      - judge0_db_data:/var/lib/postgresql/data
    networks:
      - judge0_net

  redis:
    image: redis:6
    container_name: redis-judge0
    networks:
      - judge0_net

  server:
    image: judge0/judge0:latest
    container_name: judge0-server
    ports:
      - "2358:2358"
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_POSTGRES_PASSWORD}
    depends_on:
      - db
      - redis
    networks:
      - judge0_net
    command: >
      bash -li -c "export PATH=/usr/local/ruby-2.7.0/bin:/api/bin:$$PATH; ./scripts/server"

  workers:
    image: judge0/judge0:latest
    container_name: judge0-workers
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_POSTGRES_PASSWORD}
    depends_on:
      - server
    networks:
      - judge0_net
    privileged: true
    command: >
      bash -li -c "export PATH=/usr/local/ruby-2.7.0/bin:/api/bin:$$PATH; ./scripts/workers"

  app-db:
    image: postgres:16
    container_name: postgres-db-app
    restart: always
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${APP_POSTGRES_PASSWORD}
    volumes:
      - app-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - judge0_net

  next-app:
    build:
      context: ./next-app
      dockerfile: Dockerfile
    container_name: coding-learning-system-web
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    environment:
      APP_DATABASE_URL: ${APP_DATABASE_URL}
    depends_on:
      server:
        condition: service_started
      app-db:
        condition: service_healthy
    networks:
      - judge0_net

volumes:
  judge0_db_data:
  app-db-data:

networks:
  judge0_net:
    name: judge0_net

