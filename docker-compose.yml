name: coding-learning-system

services:
  db:
    image: postgres:13
    container_name: postgres-db-judge0
    restart: always
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_POSTGRES_PASSWORD}
    volumes:
      - ${DB_VOLUMES_BASE:-./data}/judge0-db:/var/lib/postgresql/data
    networks:
      - judge0_net

  redis:
    image: redis:6
    container_name: redis-judge0
    restart: always
    networks:
      - judge0_net

  server:
    image: judge0/judge0:latest
    container_name: judge0-server
    restart: always
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_POSTGRES_PASSWORD}
    depends_on:
      - db
      - redis
    networks:
      - judge0_net
    command: >
      bash -li -c "export PATH=/usr/local/ruby-2.7.0/bin:/api/bin:$$PATH; ./scripts/server"

  workers:
    image: judge0/judge0:latest
    container_name: judge0-workers
    restart: always
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_POSTGRES_PASSWORD}
    depends_on:
      - server
    networks:
      - judge0_net
    privileged: true
    command: >
      bash -li -c "export PATH=/usr/local/ruby-2.7.0/bin:/api/bin:$$PATH; ./scripts/workers"

  app-db:
    image: postgres:16
    container_name: postgres-db-app
    restart: always
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${APP_POSTGRES_PASSWORD}
    volumes:
      - ${DB_VOLUMES_BASE:-./data}/app-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - judge0_net

  next-app:
    build:
      context: ./next-app
      dockerfile: Dockerfile
    container_name: coding-learning-system-web
    restart: always
    env_file:
      - ./.env
    environment:
      APP_DATABASE_URL: postgres://app:${APP_POSTGRES_PASSWORD}@app-db:5432/app
    depends_on:
      server:
        condition: service_started
      app-db:
        condition: service_healthy
    networks:
      - judge0_net
      - coding-learning-network

networks:
  judge0_net:
    name: judge0_net
  coding-learning-network:
    external: true
